<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Remax Egg Hunt</title>
    <link href="static/style.css" rel="stylesheet" />
    <link rel="icon" href="static/images/favicon.ico">
  </head>
  <body>
    <div id="welcome-screen">
        <h1>RemaxPropT Egg Hunt</h1>
        <p>Let the Hunt begin!</p>
        <button id="goto-signup">Signup</button>
        <button id="goto-login">Login</button>

    </div>
    <div id="signup-screen">
        <h2>Signup with your email</h2>
        <input type="email" id="signup-email" placeholder="Email">
        <input type="email" id="verify-email" placeholder="Confirm Email">
        <input type="password" id="signup-password" placeholder="Password">
        <input type="password" id="signup-verify" placeholder="Confirm Password">
        <button id="submit-signup">Submit</button>
        <button id="signup-back">Back</button>

    </div>
    <div id="login-screen">
        <h2>Login with your email and password</h2>
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Password">
        <button id="submit-login">Submit</button>
        <button id="login-back">Back</button>

    </div>
    <div id="hunt-screen">
      <h2>Let the Hunt begin!</h2>
      <div id="hint-card">
        <button id="hint-button">Hint</button>
        <p id="the-hint">...</p>
      </div>
      <div id="progress-card">Progress</div>
        <button id="progress-button">Progress</button>
        <p id="the-progress">...</p>
      <button id="location-check">I'm Here!</button>
      <button id="hunt-back">Back</button>

    </div>
    <div id="win-screen">

    </div>
    <div id="instruction-screen">

    </div>
    <div id="error-email">
      <h2>Please make sure the emails match</h2>
      <button id="error-email-back">Back</button>
    </div>
    <div id="error-password">
      <h2>Please make sure the passwords match</h2>
      <button id="error-password-back">Back</button>
    </div>
    <script src="static/app.js"></script>
  </body>
</html>
